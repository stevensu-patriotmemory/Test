<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Spreadsheet Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; }  
        input[type="text"] { margin-bottom: 20px; width: 100%; padding: 10px; }  
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
    <script>
        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const table = document.getElementById('dataTable');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName('td');
                let shouldDisplay = false;
                for (let j = 0; j < td.length; j++) {
                    if (td[j] && td[j].textContent.toLowerCase().indexOf(filter) > -1) {
                        shouldDisplay = true;
                        break;
                    }
                }
                tr[i].style.display = shouldDisplay ? '' : 'none';
            }
        }

        function fetchData() {
            // Replace 'your_google_sheet_data_url' with your actual Google Sheets data API URL
            const url = 'your_google_sheet_data_url';
            fetch(url)
                .then(response => response.json())
                .then(data => populateTable(data));
        }

        function populateTable(data) {
            const table = document.getElementById('dataTable');
            data.forEach(row => {
                let newRow = table.insertRow();
                row.forEach(cellData => {
                    let newCell = newRow.insertCell();
                    newCell.textContent = cellData;
                });
            });
        }

        window.onload = fetchData;
    </script>
</head>
<body>
    <h1>Interactive Spreadsheet Viewer</h1>
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search for data...">
    <table id="dataTable">
        <tr>
            <th>Column 1</th>
            <th>Column 2</th>
            <th>Column 3</th>
            <!-- Add more columns as needed -->
        </tr>
        <!-- Data will be populated here from Google Sheets -->
    </table>
</body>
</html>
